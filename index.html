  <!-- Confetti script -->
  <script type="text/javascript">
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    
    let particles = [];
    const colors = ['#00d2d3', '#ffdd59', '#0be881', '#ffffff', '#ff5e57'];

    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height - 20;
        this.r = Math.random() * 1.5 + 1; // square half-size
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.speedY = Math.random() * 1.5 + 0.8;
        this.speedX = Math.random() * 0.6 - 0.3;
        this.angle = Math.random() * Math.PI * 2;
        this.spinSpeed = Math.random() * 0.05 + 0.01;
      }
      
      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.angle += this.spinSpeed;
        
        if (this.y > canvas.height) {
          this.y = -10;
          this.x = Math.random() * canvas.width;
          this.speedY = Math.random() * 1.5 + 0.8;
        }
      }
      
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.r, -this.r, this.r * 2, this.r * 2);
        ctx.restore();
      }
    }

    // Initialize 60 confetti particles
    for (let i = 0; i < 60; i++) {
      particles.push(new Particle());
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateConfetti);
    }
    
    animateConfetti();
  </script>

  <!-- Store Tabs and Lightbox Interaction Script -->
  <script type="text/javascript">
    let currentBranch = '';
    const padZero = (n) => String(n).padStart(2, '0');

    function showHome() {
      currentBranch = '';
      
      const tabGeneral = document.getElementById('hero-tab-general');
      const tabAlangulam = document.getElementById('hero-tab-alangulam');
      const tabTenkasi = document.getElementById('hero-tab-tenkasi');
      const tabThirunelveli = document.getElementById('hero-tab-thirunelveli');
      const homeHeader = document.getElementById('home-header');
      const branchHeader = document.getElementById('branch-header');
      const gridContainer = document.getElementById('offers-grid-container');
      
      const inactiveClass = 'px-6 py-2.5 rounded-full font-black text-sm md:text-base uppercase tracking-wider transition-all duration-300 text-white hover:bg-white/10 border-2 border-white/50 select-none';
      
      tabGeneral.className = inactiveClass;
      tabAlangulam.className = inactiveClass;
      tabTenkasi.className = inactiveClass;
      if (tabThirunelveli) tabThirunelveli.className = inactiveClass;
      
      homeHeader.classList.remove('hidden');
      homeHeader.classList.add('flex');
      branchHeader.classList.add('hidden');
      branchHeader.classList.remove('flex');
      gridContainer.classList.add('hidden');
    }

    function selectBranch(branch) {
      currentBranch = branch;
      
      const tabGeneral = document.getElementById('hero-tab-general');
      const tabAlangulam = document.getElementById('hero-tab-alangulam');
      const tabTenkasi = document.getElementById('hero-tab-tenkasi');
      const tabThirunelveli = document.getElementById('hero-tab-thirunelveli');
      const branchTitle = document.getElementById('branch-title');
      const homeHeader = document.getElementById('home-header');
      const branchHeader = document.getElementById('branch-header');
      const gridContainer = document.getElementById('offers-grid-container');
      
      const inactiveClass = 'px-6 py-2.5 rounded-full font-black text-sm md:text-base uppercase tracking-wider transition-all duration-300 text-white hover:bg-white/10 border-2 border-white/50 select-none';
      const activeClass = 'px-6 py-2.5 rounded-full font-black text-sm md:text-base uppercase tracking-wider transition-all duration-300 bg-gold text-navy hover:bg-gold-light border-2 border-gold shadow-md select-none';
      
      tabGeneral.className = inactiveClass;
      tabAlangulam.className = inactiveClass;
      tabTenkasi.className = inactiveClass;
      if (tabThirunelveli) tabThirunelveli.className = inactiveClass;
      
      homeHeader.classList.add('hidden');
      homeHeader.classList.remove('flex');
      branchHeader.classList.remove('hidden');
      branchHeader.classList.add('flex');
      gridContainer.classList.remove('hidden');
      
      if (branch === 'general') {
        tabGeneral.className = activeClass;
        branchTitle.innerText = 'General Offers';
      } else if (branch === 'alangulam') {
        tabAlangulam.className = activeClass;
        branchTitle.innerText = 'Alangulam Store Offers';
      } else if (branch === 'tenkasi') {
        tabTenkasi.className = activeClass;
        branchTitle.innerText = 'Tenkasi Store Offers';
      } else if (branch === 'thirunelveli') {
        if (tabThirunelveli) tabThirunelveli.className = activeClass;
        branchTitle.innerText = 'Thirunelveli Store Offers';
      }
      
      renderOffers(branch);
    }

    function renderOffers(branch) {
      const grid = document.getElementById('offers-grid');
      let html = '';
      
      if (branch === 'general') {
        const totalGeneral = 14;
        const branchName = 'General';
        for (let i = 1; i <= totalGeneral; i++) {
          const imgSrc = `media/general/${i}.jpg`;
          html += createOfferCard(imgSrc, branchName, i, 'object-contain');
        }
      } else if (branch === 'alangulam') {
        const totalAlangulam = 23;
        const branchName = 'Alangulam';
        for (let i = 1; i <= totalAlangulam; i++) {
          const paddedIdx = padZero(i);
          const imgSrc = `media/Alangulam/Alangulam%201080%20x%201350%20pix/S1%201080%20X%201350-${paddedIdx}.jpg`;
          html += createOfferCard(imgSrc, branchName, paddedIdx, 'object-cover');
        }
      } else if (branch === 'tenkasi') {
        const totalTenkasi = 42;
        const branchName = 'Tenkasi';
        for (let i = 1; i <= totalTenkasi; i++) {
          const paddedIdx = padZero(i);
          const imgSrc = `media/Tenkasi/Tenkasi%201080%20x%201350%20pix/S2%201080%20X%201350-${paddedIdx}.jpg`;
          html += createOfferCard(imgSrc, branchName, paddedIdx, 'object-cover');
        }
      } else if (branch === 'thirunelveli') {
        const totalThirunelveli = 31;
        const branchName = 'Thirunelveli';
        for (let i = 1; i <= totalThirunelveli; i++) {
          if (i === 30) continue; // Skip missing file S3 1080 X 1350-30.jpg
          const paddedIdx = padZero(i);
          const imgSrc = `media/thirunelveli/WEB%20S3%201080%20X%201350%20PIX/S3%201080%20X%201350-${paddedIdx}.jpg`;
          html += createOfferCard(imgSrc, branchName, paddedIdx, 'object-cover');
        }
      }
      
      grid.innerHTML = html;
    }

    function createOfferCard(imgSrc, branchName, indexVal, fitClass = 'object-cover') {
      const cardTitle = `${branchName} Offer ${indexVal}`;
      return `
        <div class="group relative bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 hover:scale-[1.01] border border-gray-100 flex flex-col justify-between cursor-pointer" onclick="openLightbox('${imgSrc}')">
          <div class="relative aspect-[4/5] bg-gray-100 overflow-hidden flex items-center justify-center">
            <img src="${imgSrc}" alt="${cardTitle}" loading="lazy" class="w-full h-full ${fitClass} transition-transform duration-500 group-hover:scale-105" />
            
            <div class="absolute inset-0 bg-gradient-to-t from-navy/80 via-navy/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-4">
              <span class="text-white font-bold text-xs bg-deepred px-3 py-1.5 rounded-full w-max mx-auto shadow-md tracking-wider uppercase">
                Zoom View
              </span>
            </div>
          </div>
        </div>
      `;
    }

    function openLightbox(src) {
      const modal = document.getElementById('lightbox-modal');
      const img = document.getElementById('lightbox-img');
      const content = document.getElementById('lightbox-content');
      
      img.src = src.replace(/%20/g, ' ');
      
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.classList.add('opacity-100');
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
      }, 10);
      
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const modal = document.getElementById('lightbox-modal');
      const content = document.getElementById('lightbox-content');
      
      modal.classList.remove('opacity-100');
      modal.classList.add('opacity-0');
      content.classList.remove('scale-100', 'opacity-100');
      content.classList.add('scale-95', 'opacity-0');
      
      setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';
      }, 300);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeLightbox();
      }
    });

    document.getElementById('lightbox-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeLightbox();
      }
    });

    // Initialize with Home View on load
    document.addEventListener('DOMContentLoaded', () => {
      showHome();
    });
  </script>
